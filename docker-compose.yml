version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=file:./dev.db
      - JWT_ACCESS_SECRET=long_secure_jwt_access_token_secret_12345
      - JWT_REFRESH_SECRET=long_secure_jwt_refresh_token_secret_54321
      - JWT_ACCESS_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRES_IN=7d
      # Uncomment and configure key for live Gemini AI support
      # - GEMINI_API_KEY=your_gemini_api_key
      # Configure to enable live email triggers
      # - SMTP_HOST=smtp.mailtrap.io
      # - SMTP_PORT=2525
      # - SMTP_USER=your_smtp_user
      # - SMTP_PASS=your_smtp_password
    volumes:
      - backend-db:/app/prisma
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:5000/api
      - VITE_WS_URL=http://localhost:5000
    restart: always

volumes:
  backend-db:
